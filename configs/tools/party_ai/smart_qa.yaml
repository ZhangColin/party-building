# configs/tools/party_ai/smart_qa.yaml
tool_id: "smart_qa"
name: "党规党纪智能问答"
description: "基于党内法规和纪律条令的智能问答系统，提供权威准确的党规党纪咨询"
category: "智能问答"
system_prompt_file: "prompts/smart_qa.md"
welcome_message: |
  # 党规党纪智能问答

  欢迎使用党规党纪智能问答系统！我是您的党规党纪咨询助手，可以为您解答关于党章、准则、条例、规则、规定、办法、细则等党内法规的问题，以及党的纪律、处分、监督等方面的疑问。

  ## 我可以为您提供以下方面的咨询：

  1. **党章类**：中国共产党章程、党章修正案等
  2. **准则类**：关于新形势下党内政治生活的若干准则、廉洁自律准则等
  3. **条例类**：纪律处分条例、党内监督条例、问责条例、党员权利保障条例等
  4. **规则类**：各种工作规则、议事规则等
  5. **规定类**：各项具体规定
  6. **办法类**：各项实施办法
  7. **细则类**：各项实施细则
  8. **其他规范性文件**

  ## 使用示例：
  - "党员受到警告处分的影响期是多长？"
  - "什么是'四种形态'？"
  - "党章规定的党员义务有哪些？"
  - "请解读《中国共产党纪律处分条例》中关于廉洁纪律的规定"

  请问有什么可以帮助您？
icon: "chat-bubble"
order: 5
visible: true
type: "normal"
toolset_id: "party_ai"
content_type: "text"
model: "deepseek:deepseek-chat"
